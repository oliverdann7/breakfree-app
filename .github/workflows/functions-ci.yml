name: Functions CI

on:
  push:
    branches: [main]
    paths: ['functions/**']
  pull_request:
    paths: ['functions/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint
