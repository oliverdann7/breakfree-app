name: Lighthouse

# Runs against the deployed Vercel URL. Schedule weekly + manual.
# Assertion thresholds live in .lighthouserc.json (mirror docs/PERF_BUDGETS.md).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1' # Mondays 04:00 UTC

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x
      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
