name: EAS Preview Build

# Triggers a preview build on TestFlight Internal + Play Internal Testing.
# Manually run from Actions tab; auto-runs on push to main once EXPO_TOKEN is set.
# Required secret: EXPO_TOKEN (https://expo.dev/accounts/[account]/settings/access-tokens)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, ios, android)'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ secrets.EXPO_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install --legacy-peer-deps
      - run: eas build --platform ${{ inputs.platform }} --profile preview --non-interactive --no-wait
