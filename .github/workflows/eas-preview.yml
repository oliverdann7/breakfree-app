name: EAS Preview Build

# Manually triggered preview build on TestFlight Internal + Play Internal Testing.
# Run it from the Actions tab once the EXPO_TOKEN secret is set.
# Get a token: https://expo.dev/accounts/[account]/settings/access-tokens

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, ios, android)'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # `secrets` is not allowed in `if:` conditions, so surface it as an env
      # var and guard the build in a step instead.
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Require EXPO_TOKEN
        if: env.EXPO_TOKEN == ''
        run: |
          echo "::error::EXPO_TOKEN secret is not set. Add it under Settings → Secrets → Actions, then re-run."
          exit 1
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}
      - run: npm install --legacy-peer-deps
      - run: eas build --platform ${{ inputs.platform }} --profile preview --non-interactive --no-wait
